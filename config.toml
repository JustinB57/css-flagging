baseURL = "https://cssflagging.com/"
themesDir = "themes"
theme = "hugo-serif-theme"
locale = "en-us"
title = "Construction Safety Services Inc."

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow raw HTML in content (needed for the gallery grid and download button)

[params]
  # In most cases you will only want to set the google_analytics_id OR the google_tag_manager_id.
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "favicon-32x32.svg"

  [params.homepage]
    sticky_header = true
    show_contact_box = true       # show / hide the contact box on the homepage
    show_services_button = true   # show / hide the "view all services" button

  [params.logo]
    mobile = "images/logo/css-mark-mobile.svg"
    mobile_height = "40px"
    desktop = "images/logo/css-mark.svg"
    desktop_height = "52px"
    alt = "Construction Safety Services Inc."

  [params.fonts]
    # sets the google font link in layouts/partials/google-fonts.html
    google_fonts = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;700&display=swap'
    heading = "Playfair Display"
    base = "Source Sans Pro"

  [params.colors]
    primary = "#C8102E"        # provisional CSS brand red — replace with the exact value when sourced
    black = "#2f2f41"
    white = "#ffffff"
    white_offset = "#f6f7ff"
    grey = "#5C5A5A"

  [params.seo]
    meta_twitter_site = ""
    meta_twitter_creator = ""
    meta_og_image = "https://cssflagging.com/images/css/fleet.webp"

  [params.services]
    summary_truncate = 120 # How many characters to include in the summary of the services before truncating

  [params.footer]
    copyright_text = '&copy; 2026 Construction Safety Services Inc. All rights reserved.'

[menu]
  # Main Menu
  [[menu.main]]
    name = "Services"
    url = "/services/"
    weight = 1

  [[menu.main]]
    name = "Gallery"
    url = "/gallery/"
    weight = 2

  [[menu.main]]
    name = "Testimonials"
    url = "/testimonials/"
    weight = 3

  [[menu.main]]
    name = "Application"
    url = "/application/"
    weight = 4

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

  # Footer Menu
  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Services"
    url = "/services/"
    weight = 2

  [[menu.footer]]
    name = "Application"
    url = "/application/"
    weight = 3

  [[menu.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 4
